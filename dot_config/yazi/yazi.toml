[open]
# use a custom vscode opener defined below; the `use` field is required
# match every path with url = "*" rather than the invalid name field
rules = [
	{ url = "*", use = "vscode" },
]

[manager]
show_hidden = true
mouse_events = true
sort_by = "alphabetical"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
# Memorize last directory
cwd = "~/.config/yazi/last-cwd"

[theme]
use = "cyberpunk_nk"

[opener]
# open anything with Visual Studio Code, detaching so Yazi doesn't wait
vscode = [
    { run = "code %s", orphan = true },
]

